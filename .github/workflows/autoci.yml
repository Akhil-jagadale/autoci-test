name: AutoCI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: akhileshj/autoci-app
      VERSION: v${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get previous stable image
        run: docker pull $IMAGE_NAME:latest || true

      - name: Build new version
        run: docker build -t $IMAGE_NAME:$VERSION .

      - name: Run container test
        run: |
          docker rm -f test-container || true

          docker run -d --name test-container $IMAGE_NAME:$VERSION

          sleep 5

          STATUS=$(docker inspect -f '{{.State.Status}}' test-container)
          EXIT_CODE=$(docker inspect -f '{{.State.ExitCode}}' test-container)

          echo "Status: $STATUS"
          echo "Exit Code: $EXIT_CODE"

          if [ "$STATUS" = "running" ] || [ "$EXIT_CODE" = "0" ]; then
            echo "Container test passed"
            docker logs test-container
            docker rm -f test-container
          else
            echo "Container test failed"
            docker logs test-container
            exit 1
          fi

      - name: Push version image
        if: success()
        run: docker push $IMAGE_NAME:$VERSION

      - name: Update latest tag
        if: success()
        run: |
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

      - name: Rollback to previous stable
        if: failure()
        run: |
          echo "Rolling back to previous stable version"
          docker rm -f rollback-container || true
          docker run -d --name rollback-container $IMAGE_NAME:latest
