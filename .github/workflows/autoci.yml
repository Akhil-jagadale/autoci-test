name: AutoCI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: akhileshj/autoci-app
      VERSION: v${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Pull last stable version
      - name: Get previous stable image
        run: |
          echo "Pulling previous stable image"
          docker pull $IMAGE_NAME:latest || true

      # Build new version
      - name: Build new version
        run: docker build -t $IMAGE_NAME:$VERSION .

      # Run smoke test
      - name: Run container test
        id: test
        run: |
          docker run -d -p 5000:5000 --name test-container $IMAGE_NAME:$VERSION
          sleep 8

          if docker ps | grep test-container; then
            echo "New version healthy"
            docker stop test-container
            docker rm test-container
          else
            echo "New version failed"
            exit 1
          fi

      # Push only if success
      - name: Push version image
        if: success()
        run: docker push $IMAGE_NAME:$VERSION

      # Update latest only if success
      - name: Update latest tag
        if: success()
        run: |
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

      # Rollback if failure
      - name: Rollback to previous stable
        if: failure()
        run: |
         echo "Rolling back to previous stable version"
         docker rm -f test-container || true
         docker run -d -p 5000:5000 --name rollback-container $IMAGE_NAME:latest
