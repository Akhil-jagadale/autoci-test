name: AutoCI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: akhileshj/autoci-app
      VERSION: v${{ github.run_number }}
      CONTAINER_NAME: autoci-app

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get previous stable image
        run: docker pull $IMAGE_NAME:latest || true

      - name: Build new version
        run: docker build -t $IMAGE_NAME:$VERSION .

      - name: Run container test
        run: |
          docker rm -f test-container || true

          docker run -d --name test-container $IMAGE_NAME:$VERSION
          sleep 5

          STATUS=$(docker inspect -f '{{.State.Status}}' test-container)
          EXIT_CODE=$(docker inspect -f '{{.State.ExitCode}}' test-container)

          echo "Status: $STATUS"
          echo "Exit Code: $EXIT_CODE"

          if [ "$STATUS" = "running" ] || [ "$EXIT_CODE" = "0" ]; then
            echo "Container test passed"
            docker logs test-container
            docker rm -f test-container
          else
            echo "Container test failed"
            docker logs test-container
            exit 1
          fi

      - name: Push version image
        if: success()
        run: docker push $IMAGE_NAME:$VERSION

      - name: Update latest tag
        if: success()
        run: |
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

      # ---------------- DEPLOY TO EC2 ----------------

      - name: Deploy to EC2
        if: success()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Pull latest image"
            docker pull $IMAGE_NAME:latest

            echo "Stop old container"
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            echo "Run new container"
            docker run -d -p 80:80 --name $CONTAINER_NAME $IMAGE_NAME:latest

            sleep 5
            docker ps

      # ---------------- ROLLBACK ----------------

      - name: Rollback deployment
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Rollback to previous stable"
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker run -d -p 80:80 --name $CONTAINER_NAME $IMAGE_NAME:latest
