
name: AutoCI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t autoci-app .

      - name: Run container
        run: docker run -d -p 5000:5000 autoci-app
