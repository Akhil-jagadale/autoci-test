name: AutoCI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: akhileshj/autoci-app

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set version
      run: echo "VERSION=v${{ github.run_number }}" >> $GITHUB_ENV

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build new version
      run: |
        docker build --no-cache -t $IMAGE_NAME:$VERSION -t $IMAGE_NAME:latest .

    - name: Run container test
      run: |
        docker rm -f test-container || true

        docker run -d --name test-container $IMAGE_NAME:$VERSION

        sleep 8

        if [ "$(docker inspect -f '{{.State.Running}}' test-container)" = "true" ]; then
          echo "Container running successfully"
          docker stop test-container
          docker rm test-container
        else
          echo "Container failed"
          docker logs test-container
          exit 1
        fi

    - name: Push images
      run: |
        docker push $IMAGE_NAME:$VERSION
        docker push $IMAGE_NAME:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull $IMAGE_NAME:latest

          docker stop ${{ secrets.CONTAINER_NAME }} || true
          docker rm ${{ secrets.CONTAINER_NAME }} || true

          docker run -d -p 80:5000 --name ${{ secrets.CONTAINER_NAME }} $IMAGE_NAME:latest

          docker ps

    - name: Rollback deployment
      if: failure()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull $IMAGE_NAME:latest

          docker stop ${{ secrets.CONTAINER_NAME }} || true
          docker rm ${{ secrets.CONTAINER_NAME }} || true

          docker run -d -p 80:5000 --name ${{ secrets.CONTAINER_NAME }} $IMAGE_NAME:latest
