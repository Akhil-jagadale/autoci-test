name: AutoCI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: akhileshj/autoci-app
  CONTAINER_NAME: autoci-app

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set version
      run: echo "VERSION=v${{ github.run_number }}" >> $GITHUB_ENV

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # -----------------------------
    # Get previous stable image
    # -----------------------------
    - name: Get previous stable image
      run: |
        docker pull $IMAGE_NAME:latest || true

    # -----------------------------
    # Build new version (NO CACHE)
    # -----------------------------
    - name: Build new version
      run: |
        docker build --no-cache -t $IMAGE_NAME:$VERSION .

    # -----------------------------
    # Test container
    # -----------------------------
    - name: Run container test
      run: |
        docker rm -f test-container || true

        docker run -d --name test-container $IMAGE_NAME:$VERSION

        sleep 8

        if [ "$(docker inspect -f '{{.State.Running}}' test-container)" = "true" ]; then
          echo "Container running successfully"
          docker stop test-container
          docker rm test-container
        else
          echo "Container failed"
          docker logs test-container
          exit 1
        fi

    # -----------------------------
    # Push version image
    # -----------------------------
    - name: Push version image
      run: |
        docker push $IMAGE_NAME:$VERSION

    # -----------------------------
    # Update latest tag
    # -----------------------------
    - name: Update latest tag
      run: |
        docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest

    # -----------------------------
    # Deploy to EC2
    # -----------------------------
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Pull latest image"
          docker pull $IMAGE_NAME:latest

          echo "Stop old container"
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

          echo "Run new container"
          docker run -d -p 80:5000 --name $CONTAINER_NAME $IMAGE_NAME:latest

          sleep 5
          docker ps

    # -----------------------------
    # Rollback deployment
    # -----------------------------
    - name: Rollback deployment
      if: failure()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Rolling back to previous stable version"

          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

          docker run -d -p 80:5000 --name $CONTAINER_NAME $IMAGE_NAME:latest
